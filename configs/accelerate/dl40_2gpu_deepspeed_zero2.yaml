# Accelerate DeepSpeed ZeRO-2 preset for dl40: 2x A100.
# ZeRO-2 shards optimizer states + grads (params remain replicated). Lighter
# than FSDP; useful when AdamW state is the dominant memory cost.
#
# Verified working 2026-05-01 on GPU 4+5: `losses=[0.867, 2.558]` (matches
# DDP within noise). Unlike FSDP, ZeRO-2 does not shard parameters and so
# is unaffected by the nn.MultiheadAttention blocker.
#
# Requires: `deepspeed>=0.18` (already in pyproject). First DS run JIT-builds
# CPU/CUDA extensions; subsequent runs skip the rebuild.
#
# Pick GPUs at run time via CUDA_VISIBLE_DEVICES.
compute_environment: LOCAL_MACHINE
distributed_type: DEEPSPEED
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  gradient_accumulation_steps: 1
  gradient_clipping: 1.0
  offload_optimizer_device: none
  offload_param_device: none
  zero3_init_flag: false
  zero_stage: 2

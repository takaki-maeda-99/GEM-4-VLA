# Accelerate launch preset for dl40: 2x A100 40GB.
# GPUs picked at run time via CUDA_VISIBLE_DEVICES env var (set by caller)
# rather than hardcoded `gpu_ids` here, since which pair is free varies.
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

# Accelerate launch preset for dl50: 2x RTX 6000 Ada 49GB.
# Use when only 2 GPUs are free in one NUMA node (e.g. v45 holds 0-3 →
# 4-7 free, pick 4,5 for intra-NUMA1 DDP). Effective batch with bs=8
# per-GPU = 16.
#
# Launch (NB: if another accelerate job is already running on this node,
# pass --main_process_port <unused> — accelerate defaults to 29500 and
# concurrent jobs on the same port silently hang in DDP shape-verify):
#   CUDA_VISIBLE_DEVICES=4,5 \
#     accelerate launch --config_file configs/accelerate/dl50_2gpu.yaml \
#       --main_process_port 29501 \
#       scripts/train.py configs/train/so101_v46_step30k_ft_dl50.yaml
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

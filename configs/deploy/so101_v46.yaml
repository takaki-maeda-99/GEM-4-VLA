# configs/deploy/so101_v46.yaml — deploy config for SO101 v46 FT ckpt.
#
# Pairs with: outputs/so101_v46_step30k_ft_dl50/checkpoints/step_*
# (training cfg: configs/train/so101_v46_step30k_ft_dl50.yaml)
#
# Smoke-only: this server is for testing the inference path end-to-end
# without a real SO101 robot. Set wire_only_smoke=true because (a) the
# action native frame here is "world" but a real SO101 mimicrec contract
# may expect "ee_local", and (b) we have no end-to-end real-robot
# evaluation yet, so don't pretend the actions will move a robot
# correctly.

# --- ckpt identity asserts ---
ckpt:
  expected_unnorm_key: so101_test
  expected_action_chunk_len: 8
  expected_action_dim: 7
  expected_proprio_dim: 8

# --- request field mapping ---
# wrist_image is REQUIRED by this ckpt (wrist_in_llm=True with
# wrist_view_dropout_p=0.0 → hard-required).
request_fields:
  scene_image: image_primary
  wrist_image: image_wrist
  proprio: proprio
  instruction: instruction

# --- proprio adapter ---
# Assumed client-side raw proprio: [ee_pos (3, m), ee_rotvec (3, rad),
# gripper_pos (1, 0..1)] = 7-dim. The wrapper dataset feeds the model an
# 8-dim proprio = [ee_pos, ee_rotvec, gripper/100, 0_pad]. Here the
# gripper is already pre-normalized to [0, 1] on the client side; if the
# client sends raw degrees (0..100), add a `scale` step.
proprio:
  source:
    components:
      - { name: ee_pos,     dims: 3, units: meter_axisangle_rad }
      - { name: ee_rotvec,  dims: 3, units: meter_axisangle_rad }
      - { name: gripper,    dims: 1, units: normalized_0_1 }
    total_dim: 7
  adapt:
    steps:
      - { op: copy,      source: ee_pos,    dims: 3 }
      - { op: copy,      source: ee_rotvec, dims: 3 }
      - { op: copy,      source: gripper,   dims: 1 }
      - { op: pad_zeros, dims: 1 }
    output_dim: 8
  normalization:
    method: q99
    stats_key: proprio

# --- action ---
# Training-time action: [dxyz (3, m), d_rotvec_logmap (3, rad), gripper (1, 0..1)].
# The deltas live in whatever frame the dataset's absolute EE was recorded
# in (mimicrec's SO101Adapter records `gripper_frame_link` ee in robot
# base frame → "world" here). For a real SO101 mimicrec contract you
# probably want ee_local; that requires frame_conversion=world_to_ee_local
# which the current adapter doesn't implement. wire_only_smoke=true
# bypasses the assert; expect actions NOT to move a robot correctly.
action:
  native:
    units: meter_axisangle_rad
    frame: world
    gripper:
      kind: absolute
      units: normalized_0_1
      sign: { closed: 0, open: 1 }
  contract:
    units: meter_axisangle_rad
    frame: world
    gripper:
      kind: absolute
      units: normalized_0_1
      sign: { closed: 0, open: 1 }
  denormalization:
    method: q99
    stats_key: action
  frame_conversion:
    method: none

holdposition:
  gripper_native_midpoint: 0.5

# Smoke-only: server logic + wire protocol verified; do NOT trust the
# action chunk to move a real robot. Real SO101 deploy needs:
#   1. Verified action native frame (world vs ee_local for SO101 mimicrec)
#   2. Q99 stats validated against a larger / cleaner SO101 corpus
#   3. End-to-end mimicrec → server → SO101 controller test
wire_only_smoke: true

runtime:
  device: cuda:0
  dtype: bf16
  torch_compile: "off"
  warmup_iters: 1

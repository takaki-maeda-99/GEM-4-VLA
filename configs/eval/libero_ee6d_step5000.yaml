# EE6D closed-loop smoke against the in-progress 10k run's step_5000 ckpt.
# 1 task × 1 episode, max_steps=200 (typical LIBERO success window).
# Goal: verify the F-1/F-2/F-3 inverse-decode path runs without crashing
# on a real half-trained checkpoint. Success rate is incidental.
seed: 0
checkpoint:
  path: outputs/libero_spatial_ee6d_lora_r64_2026-05-01/checkpoints/step_5000
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 35
  action_dim: 20
  action_chunk_len: 30
  loss_type: ee6d
  use_grad_checkpoint: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  unnorm_key: libero_spatial_no_noops
  stats_path: data/norm_stats/libero_spatial.json
  action_format: ee6d
robot:
  bddl_path_root: /misc/dl00/takaki/vla-gemma-4/LIBERO/libero/libero/bddl_files
  task_suite: libero_spatial
  image_size: 224
  libero_path: ${oc.env:LIBERO_PATH,/misc/dl00/takaki/vla-gemma-4/LIBERO}
eval:
  task_idxs: [0]
  num_episodes_per_task: 1
  max_steps: 200
  num_steps_wait: 5

# V15: full pipeline match against vla-gemma-4 73% baseline.
#
# Cumulative fixes from v6 baseline:
#   - layout: [BOS][prompt][scene][PROPRIO][action][EOS] (v6)
#   - prompt format: "What action should the robot take to {lang}?"
#     + add_special_tokens=False (v6)
#   - num_blocks=24, legacy MLPResNetBlock_Pro (v5)
#   - wrist_bridge per-layer SigLIP cross-attn (v9)
#   - ungated streams (no tanh gating, fixed scale 1.0) (v11)
#   - proprio Q99 normalization (v12)
#   - SigLIP transform: Resize 248 + CenterCrop 224 (v13)
#   - AdamW betas (0.9, 0.999) PyTorch default (v14)
#   - action_queries zero init (just fixed)
#   - use_soft_prompt=False: matches baseline's num_pretrain_datasets=0
#     where soft_prompt_library is None (just fixed)
#   - Mode B: no LoRA, gemma fully frozen (v8)
#   - hyperparams: bs=8 (40GB constraint), lr=2e-4, wd=0.01, clip=1.0
#
# This is the "v15-equivalent of vla-gemma-4 wristb_b16_v2" config.
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: true
  use_soft_prompt: false
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: zero
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.0
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v15/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v15_full_match
  tags: [libero_spatial, bridge_form, legacy_block, num_blocks_24, ref_layout, ref_prompt_fmt, wrist_bridge, ungated_streams, proprio_normalize, mode_b, siglip_resize_crop, adamw_default_betas, action_queries_zero_init, no_soft_prompt]

# V45 step_35000 -> LIBERO Spatial FT, arch_v2 (prompt → h_t + soft_prompt → h_sp).
#
# Arch v2 changes vs v45:
#   - prompt_in_task_stream: false -> true
#       Slices prompt position from Gemma per-layer hidden and concats to h_t,
#       feeding language directly into action_head's task cross-attn (k_task /
#       v_task). Padded positions are zeroed via prompt_attention_mask.
#   - soft_prompt_in_llm: true -> false
#       Soft prompt no longer scattered into LLM input. Instead emitted via
#       h_sp = soft_e and concat'd into action_head self-attn pool (after fc1,
#       before block loop). Restores the v33-style direct soft_prompt route.
#
# Weight compatibility:
#   - k_task/v_task are Linear(D,D), shape-independent of K_t. Adding prompt
#     tokens to h_t doesn't change weight shapes; the model just sees extra
#     task tokens that it has never been trained to attend.
#   - Self-attn pool gets +32 soft_prompt tokens. k_self/v_self/q_proj are
#     Linear(D,D); shape-compatible. Block self-attn pattern needs to adapt.
#   - LLM input embedding layout changes (soft_prompt slot gone). Gemma still
#     processes the rest correctly (RoPE positions just shift by 32).
#
# Compared to v45 FT (configs/train/libero_spatial_v45_step35k_ft.yaml):
#   - Add prompt_in_task_stream: true
#   - Flip soft_prompt_in_llm to false
#   - Everything else identical (resume from v45 step_35000, domain_id=12,
#     max_steps 15000, lr 1e-4, freeze 1500, warmup 750, save_every 1000)
#
# Hardware: 1-GPU on dl42 GPU 2 (A6000 50GB, NFS mount of /misc/dl00).
#
# Launch:
#   ssh dl42
#   cd /misc/dl00/takaki/X-VLA-Adapter
#   mkdir -p outputs/libero_spatial_v45_step35k_arch_v2_ft
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=2 \
#     nohup .venv/bin/accelerate launch \
#       --config_file configs/accelerate/dl42_1gpu.yaml \
#       scripts/train.py configs/train/libero_spatial_v45_step35k_arch_v2_ft.yaml \
#       > outputs/libero_spatial_v45_step35k_arch_v2_ft/launch.log 2>&1 &
seed: 0
model:
  num_domains: 13
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18
  action_head_layer_mode: even
  use_grad_checkpoint: true
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.0
  ungated_streams: true
  use_proper_residual: true
  proper_ffn_mode: proper_mlp
  layer_scale_init: 0.0001
  mlp_ratio: 1.0
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: false                  # arch_v2: h_sp restored
  prompt_position: after_vision
  include_proprio_placeholder: true
  proprio_in_llm: true
  prompt_max_len: 20
  prompt_in_task_stream: true                # arch_v2: prompt -> h_t
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  log_per_domain_loss: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 16384
  train: true
  domain_id: 12
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 1.0e-4
  weight_decay: 0.01
  max_steps: 15000
  freeze_steps: 1500
  warmup_steps: 750
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  resume_ckpt: outputs/oxe_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_bs8/checkpoints/step_35000
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 1000
  save_dir: outputs/libero_spatial_v45_step35k_arch_v2_ft/checkpoints
  diagnostic_first_n_batches: 50
wandb:
  enabled: true
  project: vla-project
  name: oxe_v45_step35k_arch_v2_ft_libero_spatial_domain12
  tags: [libero_spatial, ft, oxe_v45, arch_v2, prompt_in_task_stream, soft_prompt_sp, step35k, domain12, lora_alllinear, nb18, even, proprio_in_llm, ungated_streams, proper_residual, proper_mlp, layerscale1e-4, dl42, gpu2]

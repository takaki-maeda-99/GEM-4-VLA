# V25: full baseline-equivalent training (= v24 + timm SigLIP + unused_range PLE).
#
# v24 (Mode B + use_baseline_projectors) reproduced the v6 dataset-mean-fit
# failure at step_2500 (eval 0/50, z stuck ~0.35, gripper sign-flipping). Two
# remaining deltas vs the 73% baseline that hadn't been addressed:
#
#   1. Vision backbone: HF SiglipVisionModel ≠ timm SigLIPViTBackbone (abs diff
#      mean 1.7 on identical input — verified). Baseline trained projectors +
#      wrist_projector_bridge against timm features. With Mode B + random
#      scene_proj, our action_head + wrist_bridge can't compensate for HF's
#      different feature distribution.
#   2. Vision placeholder mode: v23/v24 used IMAGE_SOFT_TOKEN_ID (=258880) ×256
#      so all 256 scene positions had the same Gemma4 PLE. Baseline uses
#      <unused>_3032..<unused>_3287 (ID range 258949..259204) so each scene
#      position has a distinct PLE injection. PLE is computed from input_ids,
#      and Gemma4's per-layer additive PLE depends on the token identity even
#      when inputs_embeds is provided.
#
# Both fixes here:
#   - vision.type: timm  (new SigLIPTimmEncoder, wraps prismatic SigLIPViTBackbone)
#   - model.vision_placeholder_mode: unused_range
#
# Otherwise identical to v24.
#
# Launch (gemma4 venv required for transformers 5.5.4 + tf + prismatic):
#   CUDA_VISIBLE_DEVICES=3,4 \
#   PYTHONPATH=/misc/dl00/takaki/X-VLA-Adapter/src:\
#     /misc/dl00/takaki/vla-gemma-4/VLA-Adapter:\
#     /misc/dl00/takaki/vla-gemma-4 \
#   /misc/dl00/takaki/vla-gemma-4/.venv-gemma4/bin/python \
#     -m accelerate.commands.launch \
#     --num_processes 2 --num_machines 1 --multi_gpu --mixed_precision no \
#     --main_process_port 29511 \
#     /misc/dl00/takaki/X-VLA-Adapter/scripts/train.py \
#     /misc/dl00/takaki/X-VLA-Adapter/configs/train/libero_spatial_v25.yaml
seed: 0
model:
  num_domains: 1
  compat_profile: vla_gemma4_baseline
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: false
  prompt_max_len: 20
  use_baseline_projectors: true
  baseline_scene_init_proj_dim: 8192
  vision_placeholder_mode: unused_range   # baseline-equivalent (v24 was image_token)
  freeze_llm_and_aq: true                 # Mode B exact
vision:
  type: timm                              # baseline-equivalent (v24 was hf)
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 16
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.0
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v25/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v25_baseline_full
  tags: [libero_spatial, rlds, mode_b, wrist_bridge, baseline_arch, timm, unused_range]

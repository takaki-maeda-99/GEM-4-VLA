# V6: legacy MLPResNetBlock_Pro + num_blocks=24 (from v5)
# + reference input_ids layout: [BOS][prompt][scene][PROPRIO 1][action][EOS].
#   Soft prompts and wrist tokens NO LONGER enter the LLM input — they feed
#   the action head's self-attn pool directly via h_w / h_sp. Earlier we
#   scattered them in, which (a) distorted RoPE positions for the prompt and
#   (b) wasted attention budget on tokens the head was already going to read
#   via separate streams (modeling_prismatic_gemma4.py:625-630).
# + prompt format wrap: tokenizer now produces
#   "What action should the robot take to {instruction}?" and tokenizes with
#   add_special_tokens=False so InputPacker's BOS isn't doubled. Matches
#   vla-gemma-4 (working 73% baseline) and VLA-Adapter reference
#   (prismatic/vla/datasets/datasets.py:66).
# All other v3/v4/v5 fixes retained: pre-LLM h_w/h_sp routing, axis-angle
# proprio, RoPE port, init_state, BDDL ordering, Bridge concat in MLPResNet.
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: zero
train:
  batch_size: 4
  lr: 1.0e-4
  weight_decay: 0.0
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 10.0
  lr_coefs:
    gemma_lora:     0.1
    siglip:         0.1
    soft_prompts:   0.1
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v6/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v6_layout_promptfmt
  tags: [libero_spatial, bridge_form, legacy_block, num_blocks_24, ref_layout, ref_prompt_fmt]

# V40 OXE+LIBERO pretrain: nb=18 even + ungated_streams + 1 interleaved RLDS graph.
#
# Successor to v39. v39 originally tried to mix LIBERO into the OXE pretrain
# via 4 extra ``WeightedMultiDataset`` children (4 attempts, none reached
# step 1 — see ``v37_v38_state.md`` for the full attempt history). Codex
# peer review (2026-05-10) identified the topology as the root cause:
# WeightedMultiDataset eagerly constructs N independent RLDS pipelines per
# worker, swamping dl50's 16-CPU NUMA0 with tf.data AUTOTUNE thread
# allocation when N >= ~13. The fix is to use a single
# ``make_interleaved_dataset``-style RLDS graph with bounded thread
# budgets, which is what RT-X / OpenVLA / X-VLA all do.
#
# v40 changes (from v39 9-OXE):
#   - data.type: oxe_rlds_multidomain → oxe_interleaved
#       Dispatches to RLDSInterleavedMultidomain
#       (src/vla_project/data/datasets/rlds_interleaved_dataset.py),
#       which builds one RLDS graph for all sources and injects per-source
#       ``_domain_id`` constants before sample_from_datasets so DA-row
#       routing survives the interleave.
#   - data.sources: 9 OXE → 9 OXE + 4 LIBERO suites (id 9-12)
#       LIBERO suites are now resolved via the OXE registry
#       (configs.py:657-684) — they are symlinked from
#       modified_libero_rlds/ into stage3_openx/ so a single root works.
#       NO per-source ``reader``/``data_dir`` overrides required; the
#       interleaved loader derives both from the registry.
#   - data.traj_transform_threads / traj_read_threads / frame_transform_threads:
#       Explicit thread budgets, distributed across sources by sample
#       weight inside ``allocate_threads`` (utils/data_utils.py). Replaces
#       AUTOTUNE which spawned ~60+ threads per worker on this host.
#   - model.num_domains: 9 → 13
#   - train.num_workers: 0 (TF handles pipeline parallelism)
#
# Hardware: dl50 GPU 0-3 (NUMA0, 4× RTX 6000 Ada 49GB), DDP intra-NUMA PCIe.
# bs=8 + compile=default + GC=off retained from v37.
#
# Prereq: LIBERO suites must already be symlinked into stage3_openx/.
# Done 2026-05-10:
#   stage3_openx/libero_spatial_no_noops -> modified_libero_rlds/libero_spatial_no_noops
#   stage3_openx/libero_object_no_noops  -> modified_libero_rlds/libero_object_no_noops
#   stage3_openx/libero_goal_no_noops    -> modified_libero_rlds/libero_goal_no_noops
#   stage3_openx/libero_10_no_noops      -> modified_libero_rlds/libero_10_no_noops
#
# Launch:
#   cd /misc/dl00/takaki/X-VLA-Adapter
#   mkdir -p outputs/oxe_pretrain_v40_nb18even_ungated_interleaved_dl50_bs8
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=0,1,2,3 \
#   nohup .venv/bin/accelerate launch \
#     --config_file configs/accelerate/dl50_4gpu.yaml \
#     scripts/train.py configs/train/oxe_pretrain_v40_nb18even_ungated_interleaved_dl50_bs8.yaml \
#     > outputs/oxe_pretrain_v40_nb18even_ungated_interleaved_dl50_bs8/launch.log 2>&1 &
seed: 0
model:
  num_domains: 13                          # 9 OXE (0-8) + 4 LIBERO (9-12)
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # 1-skip across 35 Gemma layers
  action_head_layer_mode: even             # taps Gemma layers 1,3,5,...,35
  use_grad_checkpoint: false               # mandatory off when compile=on
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: true                    # bypasses MLPResNetBlock_Pro tanh gate
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_interleaved
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  # Thread budgets for the single RLDS graph. allocate_threads() in
  # utils/data_utils.py distributes these across sources proportional to
  # sample weight. With 13 sources on a 16-core NUMA0:
  #   - traj_transform_threads = 13 (~1 thread per source, weighted)
  #   - traj_read_threads = 13
  #   - frame_transform_threads = 16 (decode/resize is the hot path)
  # Total upper bound = 13 + 13 + 16 = 42 — over 16 cores but bounded
  # (vs the AUTOTUNE-driven 1144-thread blowout in v39 attempt5).
  traj_transform_threads: 13
  traj_read_threads: 13
  frame_transform_threads: 16
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
    # LIBERO 4 suites, one row per suite (split design). Each weight=0.25
    # → total LIBERO sampling rate matches one OXE domain.
    - dataset_name: libero_10_no_noops
      domain_id: 9
      weight: 0.25
    - dataset_name: libero_goal_no_noops
      domain_id: 10
      weight: 0.25
    - dataset_name: libero_object_no_noops
      domain_id: 11
      weight: 0.25
    - dataset_name: libero_spatial_no_noops
      domain_id: 12
      weight: 0.25
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 100000
  freeze_steps: 0
  warmup_steps: 1000
  freeze_group_names: []
  schedule_group_names:
    - gemma_lora
    - soft_prompts
    - action_queries
    - scene_projection
    - head_projections
    - action_head
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  compile_mode: default
  lr_coefs:
    gemma_lora:        0.1     # VLM × 0.1
    siglip:            0.0     # frozen
    wrist_siglip:      0.0     # frozen
    soft_prompts:      0.1     # × 0.1
    action_queries:    1.0     # × 1.0 (= base)
    scene_projection:  1.0     # × 1.0 (= base)
    head_projections:  1.0     # × 1.0 (= base)
    action_head:       1.0     # × 1.0 (= base)
  save_every: 5000
  save_dir: outputs/oxe_pretrain_v40_nb18even_ungated_interleaved_dl50_bs8/checkpoints
  diagnostic_first_n_batches: 100
  num_workers: 0
wandb:
  enabled: true
  project: vla-project
  name: oxe_libero_pretrain_v40_nb18even_ungated_interleaved_dl50_4gpu_bs8_warmup1k
  tags: [oxe_libero_pretrain, rlds, multidomain, interleaved, da_2layer, soft_prompt_llm, wrist_in_llm, wrist_drop02, lora_r64, 13_domains, libero_split, dl50, 4gpu, bs8, nb18, even, ungated_streams, compile_default, gc_off, scratch, no_freeze, warmup1k]

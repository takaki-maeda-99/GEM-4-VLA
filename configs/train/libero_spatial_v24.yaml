# V24: baseline-aligned arch (+ use_baseline_projectors) on v23's RLDS data.
#
# Single-flag delta vs v23: ``use_baseline_projectors=true``. This swaps:
#   - scene_proj   : DomainAwareLinear (1152→1536, no act, ~1.8M)
#                  → BaselineSceneProjector (3-MLP 1152→8192→1536→1536, GELU, 24M)
#   - proprio_proj : DomainAwareLinear (8→1536, no act, ~12K)
#                  → BaselineProprioProjector (2-MLP 8→1536→1536, GELU, 2M)
#   - action_head  : MLPResNet output_dim was hidden_dim (1536), with an external
#                    DA-Linear action_decoder mapping to action_dim. Now MLPResNet
#                    fc2 outputs action_dim directly (matches baseline
#                    action_head.model.fc2 (7, 1536)). action_decoder = passthrough.
#
# 2026-05-04 finding (memory: hf_vs_timm_siglip.md): we keep HF SiglipVisionModel
# as the vision backbone (NOT timm). v24 trains projectors against HF features
# from scratch — no ckpt loading from timm-trained baseline. Validation = does v24
# closed-loop perf on libero_spatial reach baseline 21/50 = 42%?
#
# Other notes carried from v23:
#   - data: RLDS direct (modified_libero_rlds), shuffle_buffer 256000,
#           BOUNDS_Q99 done inside the loader.
#   - num_blocks: 24 (matches baseline).
#   - Mode B (frozen LLM, no LoRA, action_queries zero-init trainable=false
#     handled in the trainer side via lr_coefs).
#   - bs=8 / GPU × 4 GPU DDP = effective 32. lr 2e-4. wu 500. flat after.
#
# Launch (gemma4 venv required for transformers 5.5.4 + tf, 2-GPU bs=16 like
# baseline):
#   CUDA_VISIBLE_DEVICES=3,4 \
#   PYTHONPATH=/misc/dl00/takaki/GEM-4-VLA/src:\
#     /misc/dl00/takaki/vla-gemma-4/VLA-Adapter:\
#     /misc/dl00/takaki/vla-gemma-4 \
#   /misc/dl00/takaki/vla-gemma-4/.venv-gemma4/bin/python \
#     -m accelerate.commands.launch \
#     --num_processes 2 --num_machines 1 --multi_gpu --mixed_precision no \
#     --main_process_port 29510 \
#     /misc/dl00/takaki/GEM-4-VLA/scripts/train.py \
#     /misc/dl00/takaki/GEM-4-VLA/configs/train/libero_spatial_v24.yaml
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: false
  prompt_max_len: 20
  use_baseline_projectors: true
  baseline_scene_init_proj_dim: 8192
  vision_placeholder_mode: image_token   # keep our v15+ scheme; v24 trains new projectors against it
  freeze_llm_and_aq: true                # Mode B exact: AQ frozen + LLM no_grad (memory ~halved, fits bs=16 on 40GB)
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 16
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.0
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v24/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v24_baseline_arch
  tags: [libero_spatial, rlds, mode_b, wrist_bridge, baseline_arch]

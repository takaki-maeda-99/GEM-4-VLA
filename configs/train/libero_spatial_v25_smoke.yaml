# One-step smoke for the v25 baseline-compatible training path.
# Keeps the same architecture/data choices as libero_spatial_v25.yaml, but
# disables wandb/checkpointing and uses batch_size=1 for quick regression checks.
seed: 0
model:
  num_domains: 1
  compat_profile: vla_gemma4_baseline
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: false
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: false
  prompt_max_len: 20
  use_baseline_projectors: true
  baseline_scene_init_proj_dim: 8192
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: true
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 4096
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 1
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 1
  freeze_steps: 0
  warmup_steps: 0
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.0
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
wandb:
  enabled: false

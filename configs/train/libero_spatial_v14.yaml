# V14: AdamW betas fix on top of v13 (image transform + proprio + Mode B
# + ungated + wrist_bridge).
#
# Discovered another diff: vla-gemma-4 73% baseline trained with PyTorch
# default AdamW betas (0.9, 0.999) — finetune_gemma4.py:1031 calls
# AdamW(param_groups, fused=...) with NO betas arg. Our X-VLA-Adapter
# was hardcoded to betas=(0.9, 0.95) (the X-VLA Stage 3 pretrain
# convention). Different beta2 timescale; (0.95) accumulates variance
# over a 20-step window, (0.999) over 1000 steps. The aggressive 0.95
# init hurts stability when grad noise is high.
#
# Architecture and other fixes identical to v13.
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: true
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: zero
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.25
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v14/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v14_betas_fix
  tags: [libero_spatial, bridge_form, legacy_block, num_blocks_24, ref_layout, ref_prompt_fmt, wrist_bridge, ungated_streams, proprio_normalize, mode_b, siglip_resize_crop, adamw_default_betas]

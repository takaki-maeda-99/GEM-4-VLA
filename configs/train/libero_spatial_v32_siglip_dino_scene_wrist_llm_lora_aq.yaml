# V32: v31 architecture + Gemma LoRA + trainable action queries.
# LoRA requires gradients through Gemma, so microbatch is small and accumulation
# preserves effective batch size 32. Schedules are optimizer-step based:
#   - gemma_lora: frozen for 1000 steps, then 500-step warmup to 0.1 * base LR.
#   - action_queries / scene_projection: 500-step warmup from step 0.
#   - head_projections / action_head: constant from step 0.
seed: 0
model:
  num_domains: 1
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  action_head_layer_mode: first_n
  use_grad_checkpoint: true
  use_wrist_bridge: false
  use_wrist_dinov2: false
  use_scene_wrist_dinov2_llm: true
  wrist_dinov2_model_name: facebook/dinov2-base
  wrist_dinov2_hidden_dim: 768
  wrist_dinov2_num_tokens: 256
  ungated_streams: false
  use_soft_prompt: false
  prompt_max_len: 20
  use_baseline_projectors: true
  baseline_scene_init_proj_dim: 8192
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 16
    alpha: 32
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 16                    # halved from 32 — 80GB OOM with DINOv2 + 512 vision tokens
  gradient_accumulation_steps: 1
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 20000                  # 2x to keep total samples seen constant
  freeze_steps: 2000                # 2x scaled
  warmup_steps: 1000                # 2x scaled (10% of max_steps)
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    soft_prompts:      0.0
    action_queries:    1.0
    scene_projection:  1.0
    head_projections:  1.0
    action_head:       1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v32_siglip_dino_scene_wrist_llm_lora_aq/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v32_siglip_dino_scene_wrist_llm_lora_aq
  tags: [libero_spatial, rlds, mode_a, siglip_dino, scene_wrist_llm, lora, aq_trainable, bs32]

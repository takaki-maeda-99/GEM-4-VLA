# V37 nb18even bs=8 step_35000 → LIBERO Spatial finetune.
#
# Loads OXE-pretrained weights from
# outputs/oxe_pretrain_v37_nb18even_dl50_bs8/checkpoints/step_35000
# (the bs=8 production run launched 2026-05-09 08:41 on dl50 GPU 0-3,
# nb=18 + action_head_layer_mode=even taps Gemma layers 1,3,5,...,35).
#
# DA expansion: 9 → 10 rows (new row 9 = LIBERO, random init — matches
# 5/8 v37 FT attempt for comparability; warm-start from row 1 (taco_play,
# Franka EEF_POS) is the next variant if random underperforms).
#
# Diffs from configs/train/libero_spatial_v37_ft.yaml (5/8 attempt):
#   - model.num_blocks: 24 → 18
#   - model.action_head_layer_mode: (default) → even
#   - train.resume_ckpt: oxe_pretrain_v37/step_10000 → oxe_pretrain_v37_nb18even_dl50_bs8/step_35000
#   - train.save_dir: libero_spatial_v37_ft → libero_spatial_v37_nb18even_ft
#   - wandb.name + tags reflect the new pretrain source
#
# Hardware: dl50 GPU 4-7 (NUMA1, 4× RTX 6000 Ada 49GB), concurrent with
# the v37 nb18even bs=8 pretrain on GPU 0-3 (NUMA0). Use
# `--main_process_port 29501` to avoid collision with the pretrain's
# default port 29500.
#
# Launch:
#   cd /misc/dl00/takaki/X-VLA-Adapter
#   mkdir -p outputs/libero_spatial_v37_nb18even_ft
#   CUDA_VISIBLE_DEVICES=4,5,6,7 \
#     nohup .venv/bin/accelerate launch \
#       --config_file configs/accelerate/dl50_4gpu.yaml \
#       --main_process_port 29501 \
#       scripts/train.py configs/train/libero_spatial_v37_nb18even_ft.yaml \
#       > outputs/libero_spatial_v37_nb18even_ft/launch.log 2>&1 &
seed: 0
model:
  num_domains: 10                          # 9 OXE rows (0-8) + LIBERO row 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # matches pretrain (1-skip across 35 Gemma layers)
  action_head_layer_mode: even             # taps Gemma layers 1,3,5,...,35
  use_grad_checkpoint: true
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.0                # FT: deploy with wrist always present
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  log_per_domain_loss: false               # single-domain FT, redundant
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  # Smaller shuffle buffer to free host RAM for the concurrent pretrain
  # (pretrain holds 9 RLDS × 65536 on NUMA0). 16384 is enough for LIBERO
  # diversity (50 task × ~150 traj each = 7500 trajectories).
  shuffle_buffer_size: 16384
  train: true
  domain_id: 9                             # LIBERO row 9 (rows 0-8 reserved for OXE)
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  # bs=8 on 4× 49GB GPU (effective batch 32). On RTX 6000 Ada the prior
  # 5/8 FT measured 37 GB / 80GB A100 with bs=8 + GC; with GC kept on,
  # the same workload should sit comfortably under 49 GB on Ada.
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 1.0e-4                               # 0.5× of v37 pretrain LR for FT
  weight_decay: 0.01
  max_steps: 15000                         # FT budget; pretrain has done init work
  freeze_steps: 1500                       # 10% of max_steps
  warmup_steps: 750                        # 5% of max_steps
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  resume_ckpt: outputs/oxe_pretrain_v37_nb18even_dl50_bs8/checkpoints/step_35000_gates5
  resume_da_row_init: copy_row_1           # row 9 ← row 1 (taco_play, Franka EEF).
  # Attempt 3: step_35000_gates5 = step_35000 with all 18 action_head.blocks.*.gating_factor
  # forced to 5.0 (tanh ≈ 0.9999, fully saturated). Pretrain learned gates ≈ 0
  # (max |gate| = 0.0625) → action_head was effectively ignoring LLM features →
  # FT loss flat at 0.32 for both random and copy_row_1 init. Forcing gates to
  # 5.0 makes ratio_g ≈ 1.0 in MLPResNetBlock_Pro cross-attn (mlp_resnet_block_pro.py:55-58).
  # Saturation prevents further movement (bf16 ULP = 0.039 at gate=5.0 ≪ irrelevant
  # since tanh' ≈ 0 anyway), effectively equivalent to ungated_streams=True
  # without changing model architecture.
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000
  save_dir: outputs/libero_spatial_v37_nb18even_ft/checkpoints
  diagnostic_first_n_batches: 50
wandb:
  enabled: true
  project: vla-project
  name: oxe_v37_nb18even_step35k_gates5_ft_libero_spatial_domain9
  tags: [libero_spatial, ft, oxe_v37_nb18even, step35k, gates5, domain9, lora_r64, nb18, even, dl50, gpu4_7, copy_row_1]

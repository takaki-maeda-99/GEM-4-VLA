# V38 OXE pretrain: nb=35 + first_n (every Gemma layer tapped, no skipping).
#
# Hypothesis: v37 nb18even (18 blocks tapping layers 1,3,5,...,35) saw
# action_head gating_factor collapse to ≈ 0 by step_35000 (max |gate| =
# 0.0625 across 18 blocks → action_head effectively ignored LLM features
# → FT loss flat at 0.32 regardless of DA-row init). Workaround was to
# force gates to 5.0 post-hoc (`step_35000_gates5`).
#
# v38 tests whether the *layer skipping* is what kills gates. With nb=35
# + action_head_layer_mode=first_n, every Gemma transformer layer feeds
# its own action_head block (layers 1..35), removing the 1-skip pattern.
# If gates train to non-trivial values here, the issue was tap density;
# if they still collapse, the gating_factor parameterization itself is
# the culprit.
#
# Diffs from configs/train/oxe_pretrain_v37_nb18even_dl50_bs8.yaml:
#   - model.num_blocks: 18 → 35
#   - model.action_head_layer_mode: even → first_n (taps layers 1..35)
#   - train.save_dir: oxe_pretrain_v37_nb18even_dl50_bs8 → oxe_pretrain_v38_nb35_dl50_bs8
#   - wandb.name + tags reflect the new arch
#
# Memory: action_head ~2× larger (35 vs 18 blocks). bs=8 + compile=default
# + GC=off retained as-is per user decision; if first-step OOMs, fall
# back to GC=on + compile_mode=null (slower, but bs=8 preserved).
#
# Hardware: dl50 GPU 0-3 (NUMA0, 4× RTX 6000 Ada 49GB), DDP intra-NUMA PCIe.
# Same MALLOC_ARENA_MAX=2 + with_ram_budget(1) host-RAM mitigations as v37.
#
# Launch:
#   cd /misc/dl00/takaki/GEM-4-VLA
#   mkdir -p outputs/oxe_pretrain_v38_nb35_dl50_bs8
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=0,1,2,3 \
#   nohup .venv/bin/accelerate launch \
#     --config_file configs/accelerate/dl50_4gpu.yaml \
#     scripts/train.py configs/train/oxe_pretrain_v38_nb35_dl50_bs8.yaml \
#     > outputs/oxe_pretrain_v38_nb35_dl50_bs8/launch.log 2>&1 &
seed: 0
model:
  num_domains: 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 35                           # every Gemma layer (1..35)
  action_head_layer_mode: first_n          # taps layers 1,2,3,...,35 — no skipping
  use_grad_checkpoint: false               # mandatory off when compile=on
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
train:
  batch_size: 8                            # same as v37 nb18even bs=8
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 100000
  freeze_steps: 5000
  warmup_steps: 2500
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  compile_mode: default
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000
  save_dir: outputs/oxe_pretrain_v38_nb35_dl50_bs8/checkpoints
  diagnostic_first_n_batches: 100
wandb:
  enabled: true
  project: vla-project
  name: oxe_pretrain_v38_nb35_dl50_4gpu_bs8_compile_freeze5k
  tags: [oxe_pretrain, rlds, multidomain, da_2layer, soft_prompt_llm, wrist_in_llm, wrist_drop02, lora_r64, 9_domains, dl50, 4gpu, bs8, nb35, first_n, all_layers, compile_default, gc_off, scratch, freeze5k]

# Stage 1 full run: v25 stack with 24-block ActionHead reading Gemma layers
# evenly across the full 35-layer depth. This tests whether deeper LLM
# conditioning helps without increasing ActionHead depth.
seed: 0
model:
  num_domains: 1
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  action_head_layer_mode: even
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: false
  prompt_max_len: 20
  use_baseline_projectors: true
  baseline_scene_init_proj_dim: 8192
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: true
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 16
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.0
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v25_even_layers/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v25_even_layers
  tags: [libero_spatial, rlds, mode_b, wrist_bridge, baseline_arch, timm, unused_range, even_layers]

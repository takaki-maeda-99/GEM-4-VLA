# V37 OXE pretrain, dl50 production: bs=16 + num_blocks=18 even (1-skip
# cross-attention) + torch.compile + GC=off. From scratch (action head
# shape and LLM tap subscriptions both differ from the existing
# step_10000 ckpt → resume not viable).
#
# Hardware: 4× RTX 6000 Ada 49GB (NUMA0 GPU 0-3), DDP intra-NUMA PCIe.
# Effective batch = 16 × 4 = 64 (vs original 6×A100 production eff=48).
# LR kept at 2e-4 (no linear scaling) per user 2026-05-08: "安全側で".
#
# Wall-clock estimate (from 200-step trial, run laxv0a3n):
#   median step_time = 1860 ms × 100000 = 51.6 h ≈ 2.15 days
#   first step compile/autotune ≈ 6 min (cached afterwards in
#   /tmp/torchinductor_takaki/)
#
# Compile artifact lifetime: cache survives across processes but lives in
# /tmp — clears on dl50 reboot. If the run restarts after reboot it pays
# the 6-min recompile once.
#
# Launch (use nohup so the OS owns the process, not the launching shell):
#   cd /misc/dl00/takaki/GEM-4-VLA
#   CUDA_VISIBLE_DEVICES=0,1,2,3 \
#   PYTHONPATH=/misc/dl00/takaki/GEM-4-VLA/src \
#   nohup /misc/dl00/takaki/GEM-4-VLA/.venv/bin/accelerate launch \
#     --config_file configs/accelerate/dl50_4gpu.yaml \
#     scripts/train.py configs/train/oxe_pretrain_v37_nb18even_dl50.yaml \
#     > outputs/oxe_pretrain_v37_nb18even_dl50/launch.log 2>&1 &
seed: 0
model:
  num_domains: 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # ↓ from 24 (6 fewer action-head MLPResBlock + cross-attn)
  action_head_layer_mode: even             # taps Gemma layers 1,3,5,...,35 (1-skip)
  use_grad_checkpoint: false               # mandatory off when compile=on
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
train:
  batch_size: 16
  optimizer_kind: adamw_8bit
  lr: 2.0e-4                               # 安全側、eff_bs 32→64 でも linear scale せず
  weight_decay: 0.01
  max_steps: 100000
  freeze_steps: 10000                      # 10% (gemma_lora freeze)
  warmup_steps: 5000                       # 5%
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  compile_mode: default
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 10000
  save_dir: outputs/oxe_pretrain_v37_nb18even_dl50/checkpoints
  diagnostic_first_n_batches: 100
wandb:
  enabled: true
  project: vla-project
  name: oxe_pretrain_v37_nb18even_dl50_4gpu_bs16_compile
  tags: [oxe_pretrain, rlds, multidomain, da_2layer, soft_prompt_llm, wrist_in_llm, wrist_drop02, lora_r64, 9_domains, dl50, 4gpu, bs16, nb18, even, compile_default, gc_off, scratch]

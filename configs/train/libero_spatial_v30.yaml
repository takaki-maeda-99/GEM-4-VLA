# V30: v25 (74% Mode B baseline) + wrist-only SigLIP LoRA, nothing else.
#
# Hypothesis (per user 2026-05-04 22): training above-LLM modules (AQ +
# scene_projection) might be HURTING vs the pure-frozen v25 setup. Test:
# replicate v25 exactly (LLM no_grad + AQ zero-frozen + scene_proj random-
# frozen), but ADD wrist-only SigLIP LoRA on top. If v30 ≥ v25's 74%, the
# wrist SigLIP adapt was a net win. If v30 < v29 results (when those land),
# the above-LLM training was actually helping.
#
# Trainable in v30:
#   - wrist_vision_encoder LoRA adapters (~2 M params, target_modules=[qkv])
#   - head_projections (proprio_proj + wrist_proj + action_decoder + wrist_projector_bridge)
#   - action_head (~640 M)
#
# Frozen / not trained:
#   - scene SigLIP (vision_encoder)
#   - Gemma (LLM, frozen + no_grad-wrapped → no gradient flows through it)
#   - action_queries (zero-init, requires_grad=False via freeze_action_queries=true)
#   - scene_proj (random-init, gradient blocked by LLM no_grad — same as v25)
#
# Schedule: only wrist_siglip warmup (1000 step linear), rest constant from
# step 0 (matches v25 — head_projections / action_head trained at fixed lr
# from the start).
#
# Launch (gemma4 venv, single-GPU dl40 GPU 0):
#   CUDA_VISIBLE_DEVICES=0 \
#   PYTHONPATH=/misc/dl00/takaki/X-VLA-Adapter/src:\
#     /misc/dl00/takaki/vla-gemma-4/VLA-Adapter:\
#     /misc/dl00/takaki/vla-gemma-4 \
#   /misc/dl00/takaki/vla-gemma-4/.venv-gemma4/bin/python scripts/train.py \
#     /misc/dl00/takaki/X-VLA-Adapter/configs/train/libero_spatial_v30.yaml
seed: 0
model:
  num_domains: 1
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: false
  prompt_max_len: 20
  use_baseline_projectors: true
  baseline_scene_init_proj_dim: 8192
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false                # use granular flags
  freeze_action_queries: true             # AQ frozen at zero (matches v25 Mode B)
  wrap_llm_in_no_grad: true               # LLM no_grad → blocks grad to AQ + scene_proj
  wrist_siglip_lora:
    r: 16
    alpha: 32
    target_modules: [qkv]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 16                           # Mode B fits bs=16 on 80GB easily; LLM activations not stored
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 1000                       # 10% — only schedule_group_names see this
  freeze_group_names: []
  schedule_group_names: [wrist_siglip]     # only wrist LoRA gets warmup
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.0                  # empty (no Gemma LoRA)
    siglip:            0.0                  # frozen scene SigLIP
    wrist_siglip:      0.1                  # = 2e-5 final
    soft_prompts:      0.0                  # absent
    action_queries:    0.0                  # frozen at zero (also requires_grad=False)
    scene_projection:  0.0                  # frozen at random (gradient blocked by no_grad LLM)
    head_projections:  1.0                  # = 2e-4
    action_head:       1.0                  # = 2e-4
  save_every: 2500
  save_dir: outputs/libero_spatial_v30/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v30_wrist_siglip_lora_pure_modeB
  tags: [libero_spatial, rlds, mode_b, wrist_siglip_lora, wrist_bridge, baseline_arch, timm, unused_range]

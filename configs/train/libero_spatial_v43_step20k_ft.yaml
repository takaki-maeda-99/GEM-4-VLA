# V43 step_20000 -> LIBERO Spatial FT (new DA row 9, random init).
#
# v43 = v41 + LoRA target_modules expanded to all-linear (q/k/v/o/gate/up/down).
# Pretrain reached step_21000 with loss ~0.206 on 9-OXE; step_20000 is taken
# as the FT base.
#
# Diffs from configs/train/libero_spatial_v39_step5k_ft.yaml:
#   - model.lora.target_modules: [q_proj, v_proj] -> all-linear (match v43)
#   - train.resume_ckpt: v39_step_5000 -> v43_step_20000
#   - train.save_every: 5000 -> 1000 (user direction 2026-05-11; need
#       fine-grained ckpts for early FT diagnostic / eval sweep)
#   - save_dir + wandb name/tags reflect v43 source
#
# Architecture must match v43 EXACTLY for the ckpt to load:
#   - proprio_in_llm: true
#   - include_proprio_placeholder: true
#   - ungated_streams: true
#   - num_blocks: 18, action_head_layer_mode: even
#   - lora target_modules all-linear (= v43)
#
# DA expansion: 9 -> 10 rows (new row 9 = LIBERO).
# resume_da_row_init: random (MANDATORY per CLAUDE.md / feedback memory;
# copy_row_<n> contaminates new LIBERO row with zero-padded proprio
# semantics from the source domain).
#
# Hardware: dl50 GPU 4-7 (NUMA1, parallel with v45 pretrain on GPU 0-3).
# Use --main_process_port 29501 to avoid colliding with v45's port 29500.
#
# Launch:
#   cd /misc/dl00/takaki/X-VLA-Adapter
#   mkdir -p outputs/libero_spatial_v43_step20k_ft
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=4,5,6,7 \
#     nohup .venv/bin/accelerate launch \
#       --config_file configs/accelerate/dl50_4gpu.yaml \
#       --main_process_port 29501 \
#       scripts/train.py configs/train/libero_spatial_v43_step20k_ft.yaml \
#       > outputs/libero_spatial_v43_step20k_ft/launch.log 2>&1 &
seed: 0
model:
  num_domains: 10                          # 9 OXE (0-8) + LIBERO row 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # match v43
  action_head_layer_mode: even             # match v43
  use_grad_checkpoint: true                # FT: GC=on, compile=null
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.0                # FT: deploy with wrist always present
  ungated_streams: true                    # match v43
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: true        # match v43 (required by proprio_in_llm)
  proprio_in_llm: true                     # match v43
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  log_per_domain_loss: false               # single-domain FT
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]  # match v43 all-linear
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 16384               # smaller buffer (concurrent w/ v45 pretrain on NUMA0)
  train: true
  domain_id: 9                             # LIBERO row 9 (OXE = 0-8)
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 1.0e-4                               # 0.5x pretrain LR for FT
  weight_decay: 0.01
  max_steps: 15000
  freeze_steps: 1500                       # 10% of max_steps
  warmup_steps: 750                        # 5% of max_steps
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  # 2026-05-11 disk-quota crash corrupted step_9000 (truncated model.pt +
  # empty optimizer.pt). Falling back to fresh FT from v43 step_20000
  # pretrain. resume_full disabled because warm-start = no optimizer state
  # to load and num_domains expansion (9 -> 10) goes through the DA-row
  # init path which resume_full does not support.
  resume_ckpt: outputs/oxe_pretrain_v43_nb18even_lora_alllinear_dl50_bs8/checkpoints/step_20000
  resume_da_row_init: random               # MANDATORY: new DA row must be random-init.
                                           # copy_row_<n> transfers the source
                                           # domain's zero-padded proprio
                                           # semantics to the new LIBERO row.
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 1000                         # frequent ckpts for early FT diagnostic / eval sweep
  save_dir: outputs/libero_spatial_v43_step20k_ft/checkpoints
  diagnostic_first_n_batches: 50
wandb:
  enabled: true
  project: vla-project
  name: oxe_v43_alllinear_step20k_ft_libero_spatial_domain9
  tags: [libero_spatial, ft, oxe_v43_alllinear, step20k, domain9, lora_alllinear, nb18, even, proprio_in_llm, ungated_streams, dl50, gpu4_7, random_da]

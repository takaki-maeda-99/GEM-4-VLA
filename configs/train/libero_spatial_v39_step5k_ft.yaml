# V39 step_5000 → LIBERO Spatial FT (ungated_streams test).
#
# Diagnostic FT to evaluate whether v39's ``ungated_streams=true`` pretrain
# produces a more FT-able representation than v37's gated pretrain. Loss
# curve in pretrain looks identical between v39 and v37 (~0.25 plateau by
# step 2000+), so we cannot tell from pretrain loss alone whether the
# gating bottleneck is actually being bypassed. Direct comparison via FT
# is the cleanest signal:
#
#   - v37 step_35000 (raw, gates ≈ 0)              → FT loss flat 0.32, 0% LIBERO
#   - v37 step_35000_gates5 (post-hoc gate=5.0)    → FT improves
#   - v39 step_5000 (ungated from step 0)          → THIS RUN, signal expected
#
# Setup mirrors ``libero_spatial_v37_nb18even_ft.yaml`` (gates5 attempt 3)
# EXCEPT for two diffs that isolate the pretrain difference:
#   - model.ungated_streams: false → true   (matches v39 pretrain)
#   - train.resume_ckpt:
#       outputs/oxe_pretrain_v37_nb18even_dl50_bs8/checkpoints/step_35000_gates5 →
#       outputs/oxe_pretrain_v39_nb18even_ungated_dl50_bs8/checkpoints/step_5000
#
# Hardware: dl50 GPU 4-7 (NUMA1, parallel with v39 pretrain on GPU 0-3).
# Use ``--main_process_port 29501`` to avoid colliding with the pretrain's
# default port 29500. Same MALLOC_ARENA_MAX=2 host-RAM mitigation.
#
# Launch (after v39 step_5000 ckpt lands):
#   cd /misc/dl00/takaki/X-VLA-Adapter
#   mkdir -p outputs/libero_spatial_v39_step5k_ft
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=4,5,6,7 \
#     nohup .venv/bin/accelerate launch \
#       --config_file configs/accelerate/dl50_4gpu.yaml \
#       --main_process_port 29501 \
#       scripts/train.py configs/train/libero_spatial_v39_step5k_ft.yaml \
#       > outputs/libero_spatial_v39_step5k_ft/launch.log 2>&1 &
seed: 0
model:
  num_domains: 10                          # 9 OXE rows (0-8) + LIBERO row 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # matches v39 pretrain
  action_head_layer_mode: even             # taps Gemma layers 1,3,5,...,35
  use_grad_checkpoint: true                # FT: GC=on with compile=null
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.0                # FT: deploy with wrist always present
  ungated_streams: true                    # ★ matches v39 pretrain (gate bypass)
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  log_per_domain_loss: false               # single-domain FT
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 16384               # smaller buffer ok concurrent w/ pretrain
  train: true
  domain_id: 9                             # LIBERO row 9 (OXE = 0-8)
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 1.0e-4                               # v37 FT recipe (0.5× pretrain LR)
  weight_decay: 0.01
  max_steps: 15000
  freeze_steps: 1500                       # 10% of max_steps
  warmup_steps: 750                        # 5% of max_steps
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  resume_ckpt: outputs/oxe_pretrain_v39_nb18even_ungated_dl50_bs8/checkpoints/step_5000
  resume_da_row_init: random               # NEW DA row at FT must be random-init.
                                           # copy_row_<n> contaminates the new
                                           # row with the source domain's
                                           # proprio dim semantics — e.g. row 1
                                           # (taco_play) has proprio dim 6 zero-
                                           # padded (std=0.00 across the
                                           # dataset), but LIBERO uses dim 6 as
                                           # the gripper bit with std 0.89.
                                           # Copying = "ignore most informative
                                           # LIBERO dim".
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000
  save_dir: outputs/libero_spatial_v39_step5k_ft/checkpoints
  diagnostic_first_n_batches: 50
wandb:
  enabled: true
  project: vla-project
  name: oxe_v39_ungated_step5k_ft_libero_spatial_domain9
  tags: [libero_spatial, ft, oxe_v39_ungated, step5k, domain9, lora_r64, nb18, even, ungated_streams, dl50, gpu4_7, copy_row_1, ungated_check]

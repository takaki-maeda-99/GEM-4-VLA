# V35: v34 multi-domain LIBERO + shared Q99 normalization across all 4 suites.
#
# Why v35 exists: v34 step_25000 eval'd on libero_spatial = 0/50 (all timeouts)
# while architecturally identical single-domain v33 step_25000 = 31/50 (62%).
# Hypothesis (validated by code-reviewer + Codex): v34's WeightedMultiDataset
# pipeline was correct, but each child suite normalized actions/proprio with
# its OWN per-suite Q99 (rlds_libero_dataset.py:_build_rlds passes
# BOUNDS_Q99 → RLDS auto-loads per-suite stats). 4 different Q99 ranges got
# mixed across the shared backbone (LoRA, MLP-Pro action_head, soft_prompt_hub),
# with only DA-2-MLP action_decoder being per-domain — not enough to compensate.
# Result: shared layers tried to fit 4 incompatible action distributions
# simultaneously and collapsed to silent timeout policy at eval.
#
# Fix: ``data.shared_stats_path`` — single Q99 stats payload applied to ALL
# child suites. RLDSLiberoDataset injects this into each per-dataset kwargs
# (via ``dataset_statistics`` override), bypassing per-suite stats lookup.
# Training-time action distribution is now consistent across the mix; per-domain
# DA-MLP rows still differentiate task-conditioned routing, but the shared
# backbone sees a single coherent normalized space.
#
# Stats source: combined LIBERO Q99 across all 4 suites, computed by
# ``tools/aggregate_libero_stats.py`` (273k transitions / 1693 trajectories).
# Aggregation rules (per-dim element-wise):
#   q01 = min over suites,  q99 = max over suites    # widest envelope, no saturation
#   min/max = outer-bound; mean = weighted by num_transitions; std = pooled
# This eliminates the per-suite normalization mismatch that collapsed v34
# and avoids the spatial-only saturation issue (libero_goal/10 dims fitting
# inside ±1 after norm). Eval-time ``unnorm_key=libero_combined_no_noops``
# below matches the JSON wrapper key emitted by the aggregator.
#
# Architecture: identical to v34 (DA-2-MLP scene/proprio/wrist/action_decoder,
# soft prompt INJECTED into LLM, prompt_position=after_vision, no proprio
# placeholder, LoRA r=64 alpha=128 on q+v, bs=8, max_steps=40000).
#
# Launch (single GPU, dl40 NCCL multi-GPU broken since 5/4 apt upgrade):
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#   CUDA_VISIBLE_DEVICES=5 \
#   PYTHONPATH=/misc/dl00/takaki/GEM-4-VLA/src:\
#     /misc/dl00/takaki/vla-gemma-4/VLA-Adapter:\
#     /misc/dl00/takaki/vla-gemma-4 \
#   /misc/dl00/takaki/vla-gemma-4/.venv-gemma4/bin/python \
#     scripts/train.py configs/train/libero_multidomain_v35.yaml
seed: 0
model:
  num_domains: 4                            # 4 LIBERO suites
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  shuffle_buffer_size: 256000
  train: true
  seed: 42
  # eval-time stats_path / unnorm_key reference the combined-LIBERO payload so
  # de-normalization at deployment matches training-time normalization.
  unnorm_key: libero_combined_no_noops
  stats_path: outputs/libero_combined_q99/dataset_statistics.json
  # NEW vs v34: combined Q99 stats applied to every child suite, eliminating
  # per-suite distribution drift across the WeightedMultiDataset mixer.
  shared_stats_path: outputs/libero_combined_q99/dataset_statistics.json
  sources:
    - dataset_name: libero_spatial_no_noops
      domain_id: 0
      weight: 1.0
    - dataset_name: libero_object_no_noops
      domain_id: 1
      weight: 1.0
    - dataset_name: libero_goal_no_noops
      domain_id: 2
      weight: 1.0
    - dataset_name: libero_10_no_noops
      domain_id: 3
      weight: 1.0
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 40000
  freeze_steps: 4000
  warmup_steps: 2000
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000
  save_dir: outputs/libero_multidomain_v35/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_multidomain_v35_4suites_shared_q99_da2mlp_softprompt_llm_lora_r64
  tags: [libero_multidomain, rlds, mode_a, da_2layer, soft_prompt_llm, lora_r64, 4_domains, after_vision_prompt, shared_q99]

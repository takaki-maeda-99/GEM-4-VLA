# V7: hyperparams adjusted toward vla-gemma-4 73% baseline.
# Diffs vs v6:
#   - lr 1e-4 -> 2e-4 (matches wristb_v2 baseline)
#   - weight_decay 0.0 -> 0.01 (baseline)
#   - grad_clip_norm 10.0 -> 1.0 (baseline)
#   - batch_size 4 -> 8 (single-GPU; baseline = bs=16 × DDP-2GPU = effective 32, so we
#     close half the gap; bs=16 OOMs at 24-block on 40GB per perf memory)
#
# Architecture identical to v6: legacy MLPResNetBlock_Pro, num_blocks=24, ref input
# layout, prompt-format wrap. We keep LoRA r=64 here (Mode A); a v8 with Mode B
# (frozen LLM, lora_r=0) is the next isolated experiment if v7 doesn't move the
# closed-loop number.
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: zero
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.1
    siglip:         0.1
    soft_prompts:   0.1
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v7/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v7_hyperparams
  tags: [libero_spatial, bridge_form, legacy_block, num_blocks_24, ref_layout, ref_prompt_fmt, baseline_hyperparams]

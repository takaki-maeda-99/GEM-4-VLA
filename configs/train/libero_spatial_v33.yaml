# V33: X-VLA upstream-style multi-domain ready (DA × 2-layer projections)
# + soft prompt INJECTED into LLM (prefix-tuning style) + LoRA r=64.
#
# Layout in LLM input:
#   [BOS] [soft_prompt(32)] [scene(256)] [prompt_text(20)] [action(64)] [EOS]
#   = 374 tokens. proprio drops (it bypasses LLM via proprio_proj).
#
# Key changes vs v32 (Mode A + DINOv2):
#   - DROPPED DINOv2 scene+wrist→LLM path (use_scene_wrist_dinov2_llm=false)
#   - proj_arch: "da_2layer" — DomainAwareTwoLayerMLP per-domain × 2-layer GELU
#     (scene_proj, proprio_proj, wrist_proj, action_decoder all DA-2-MLP)
#   - soft_prompt_in_llm=true — soft_prompt_hub output scattered into LLM
#     emb at reserved [259462, 259493] placeholder block, NOT to action_head h_sp
#   - prompt_position: "after_vision" — instruction text after vision tokens
#   - include_proprio_placeholder=false — drop dead PROPRIO slot
#   - LoRA r=64 alpha=128 (vs v32's r=16; +10 M LoRA params, +160 MB Adam)
#   - bs=8 (vs v32's 16) + max_steps=40000 (4×) to maintain total samples
#   - num_domains=1 (libero_spatial only); design supports multi-domain when N>1
#
# Expected: performance might dip vs v25 74% baseline (X-VLA-style designs
# diverge from the "1 frozen LLM + small adapter" recipe that reached 74%).
# Goal: validate the full X-VLA-style stack before scaling to multi-dataset.
seed: 0
model:
  num_domains: 1
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true                # NEW: scatter soft prompt into LLM emb
  prompt_position: after_vision           # NEW: vision then instruction
  include_proprio_placeholder: false      # NEW: drop dead PROPRIO slot
  prompt_max_len: 20
  use_baseline_projectors: false          # use proj_arch instead
  proj_arch: da_2layer                    # per-domain × 2-layer DA MLP
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 40000                         # 4× v32 (=keep total samples constant at half bs)
  freeze_steps: 4000                       # 10% of max_steps
  warmup_steps: 2000                       # 5% of max_steps
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.1                  # = 2e-5 final (LoRA backbone)
    siglip:            0.0                  # frozen
    wrist_siglip:      0.0                  # not active
    soft_prompts:      0.5                  # = 1e-4 final (above-LLM)
    action_queries:    0.5                  # = 1e-4 final (above-LLM)
    scene_projection:  0.5                  # = 1e-4 final (above-LLM)
    head_projections:  1.0                  # = 2e-4 (below-LLM)
    action_head:       1.0                  # = 2e-4
  save_every: 5000                          # 4× max_steps → save quarterly (5k, 10k, 20k, 30k, 40k)
  save_dir: outputs/libero_spatial_v33/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v33_da2mlp_softprompt_llm_lora_r64
  tags: [libero_spatial, rlds, mode_a, da_2layer, soft_prompt_llm, lora_r64, after_vision_prompt]

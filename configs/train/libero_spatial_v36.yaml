# V36: v33 SOTA + wrist-into-LLM (π₀ "fixed slot + mask" pattern).
#
# Drops use_wrist_bridge entirely. Wrist features now enter the LLM at a
# reserved 256-token slot AFTER the language prompt; the action head's task
# stream concatenates scene+wrist hidden states and there is no separate
# wrist cross-attn branch.
#
# Layout in LLM input (fixed length, π₀ convention):
#   [BOS] [soft_prompt(32)] [scene(256)] [prompt(20)] [wrist(256)] [action(64)] [EOS] = 630 tokens
#
# vs v33 (374 tokens):
#   action positions 309..372 → 565..628 (RoPE shifts; v36 from-scratch retrain)
#
# π₀-style modality dropout:
#   wrist_view_dropout_p=0.3: at train-time, with prob 0.3 the wrist slot
#   is forced to zeros (mask=False). Trains the policy to be robust to
#   missing-wrist deployment without changing the LLM input shape.
#
# Architecture: identical to v33 (DA-2-MLP scene/proprio/wrist/action_decoder,
# soft prompt LLM injection, prompt_position=after_vision, no proprio
# placeholder, LoRA r=64 alpha=128, bs=8, max_steps=40000) except:
#   - use_wrist_bridge: false (was true in v33; bridge path removed)
#   - wrist_in_llm: true
#   - wrist_view_dropout_p: 0.3
seed: 0
model:
  num_domains: 1
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: false                 # v36: bridge dropped
  wrist_in_llm: true                       # v36: wrist → LLM at fixed slot
  wrist_view_dropout_p: 0.3                # π₀.7-style modality dropout
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 256000
  train: true
  domain_id: 0
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 40000
  freeze_steps: 4000
  warmup_steps: 2000
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000
  save_dir: outputs/libero_spatial_v36/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v36_wrist_in_llm_dropout03_da2mlp_softprompt_llm_lora_r64
  tags: [libero_spatial, rlds, mode_a, da_2layer, soft_prompt_llm, wrist_in_llm, view_dropout, lora_r64]

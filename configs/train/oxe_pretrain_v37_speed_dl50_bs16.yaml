# V37 speed trial on dl50 — same as oxe_pretrain_v37_speed_dl50.yaml but
# batch_size=16 to probe bs scaling on RTX 6000 Ada 49GB.
# Diff from the bs=8 trial:
#   - train.batch_size: 8 → 16
#   - wandb.name suffix: _bs16
# Memory headroom test: bs=8 measured 20.3 GB / 49 GB used per rank →
# linear extrapolation to bs=16 ≈ 36-40 GB (likely fits but may OOM if
# activation scaling is super-linear given grad_checkpoint=true).
seed: 0
model:
  num_domains: 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
train:
  batch_size: 16
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 200
  freeze_steps: 0
  warmup_steps: 50
  freeze_group_names: []
  schedule_group_names: []
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  resume_ckpt: outputs/oxe_pretrain_v37/checkpoints/step_10000
  resume_da_row_init: random
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: null
  save_dir: null
  diagnostic_first_n_batches: 0
wandb:
  enabled: true
  project: vla-project
  name: oxe_pretrain_v37_speed_dl50_4gpu_bs16_resume10k
  tags: [oxe_pretrain, speed_trial, 200_steps, dl50, resume_step10k, 4gpu, bs16]

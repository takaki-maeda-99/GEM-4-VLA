# Multi-domain training across all 4 LIBERO suites (spatial + goal + object + 10).
# Per-suite ~432 episodes -> ~1700 episodes total. domain_id 0..3 with the
# DomainAwareLinear projector switching weights per source.
seed: 0
model:
  num_domains: 4
  hidden_dim: 1536
  num_blocks: 35
  use_grad_checkpoint: true
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_multidomain
  seed: 0
  download_videos: false
  sources:
    - repo_id: lerobot/libero_spatial_image
      stats_path: data/norm_stats/libero_spatial.json
      unnorm_key: libero_spatial_no_noops
      fps: 10
      domain_id: 0
      last_action_chunk_mode: zero
      weight: 1.0
    - repo_id: lerobot/libero_goal_image
      stats_path: data/norm_stats/libero_goal.json
      unnorm_key: libero_goal_no_noops
      fps: 10
      domain_id: 1
      last_action_chunk_mode: zero
      weight: 1.0
    - repo_id: lerobot/libero_object_image
      stats_path: data/norm_stats/libero_object.json
      unnorm_key: libero_object_no_noops
      fps: 10
      domain_id: 2
      last_action_chunk_mode: zero
      weight: 1.0
    - repo_id: lerobot/libero_10_image
      stats_path: data/norm_stats/libero_10.json
      unnorm_key: libero_10_no_noops
      fps: 10
      domain_id: 3
      last_action_chunk_mode: zero
      weight: 1.0
train:
  batch_size: 4
  lr: 1.0e-4
  weight_decay: 0.0
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 10.0
  lr_coefs:
    gemma_lora:     0.1
    siglip:         0.1
    soft_prompts:   0.1
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_multidomain_v1/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_multidomain_v1_4suites
  tags: [libero, multi_domain, 4_suites, all_fixes]

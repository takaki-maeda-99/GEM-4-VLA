# 10k-step LIBERO-Spatial training run.
# Single-GPU bs=8 (bs=16 OOMs at 40GB even with grad_checkpoint),
# real prior-chunk fetch, full episode split.
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 35
  use_grad_checkpoint: true
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: real
  # episodes: omit -> all 432 episodes, max_samples: omit -> all 52970 frames
train:
  batch_size: 8
  lr: 1.0e-4
  soft_lr_coef: 1.0
  weight_decay: 0.01
  max_steps: 10000
  save_every: 5000
  save_dir: outputs/libero_spatial_2026-05-01/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_bs8_10k_2026-05-01
  tags: [libero_spatial, bs8, stage1, real_prior_chunk]

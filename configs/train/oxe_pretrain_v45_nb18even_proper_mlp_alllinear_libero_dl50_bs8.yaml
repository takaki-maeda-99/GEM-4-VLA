# V45 OXE+LIBERO pretrain: v44 architecture + LIBERO 4 suites mixed in.
#
# v44 = v41 + LoRA all-linear + proper Pre-LN residual + proper_mlp FFN +
# LayerScale (CaiT-style gamma init 1e-4). Currently running on dl40 GPU 4-7.
#
# v45 differs from v44 ONLY in dataset mix:
#   - data.type: oxe_rlds_multidomain -> oxe_interleaved (v40 single-graph fix)
#   - data.sources: 9 OXE -> 9 OXE + 4 LIBERO suites
#   - data.traj_transform_threads / traj_read_threads / frame_transform_threads:
#       Explicit bounded thread budgets (no AUTOTUNE blowout)
#   - model.num_domains: 9 -> 13
#
# All architecture flags (proper_residual / proper_ffn_mode / layer_scale_init /
# mlp_ratio / proprio_in_llm / ungated_streams / LoRA all-linear) carry from
# v44 unchanged.
#
# Hardware: dl50 GPU 0-3 (NUMA0, 4x RTX 6000 Ada 49GB), DDP intra-NUMA PCIe.
# Replaces v43 on dl50 GPU 0-3. Concurrent with libero_spatial_v43_step20k_ft
# on dl50 GPU 4-7 (NUMA1, port 29501).
#
# Prereq: LIBERO suites must already be symlinked into stage3_openx/.
# Verified 2026-05-11:
#   stage3_openx/libero_10_no_noops      -> modified_libero_rlds/libero_10_no_noops
#   stage3_openx/libero_goal_no_noops    -> modified_libero_rlds/libero_goal_no_noops
#   stage3_openx/libero_object_no_noops  -> modified_libero_rlds/libero_object_no_noops
#   stage3_openx/libero_spatial_no_noops -> modified_libero_rlds/libero_spatial_no_noops
#
# Launch:
#   cd /misc/dl00/takaki/X-VLA-Adapter
#   mkdir -p outputs/oxe_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_bs8
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=0,1,2,3 \
#   nohup .venv/bin/accelerate launch \
#     --config_file configs/accelerate/dl50_4gpu.yaml \
#     scripts/train.py configs/train/oxe_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_bs8.yaml \
#     > outputs/oxe_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_bs8/launch.log 2>&1 &
seed: 0
model:
  num_domains: 13                          # 9 OXE (0-8) + 4 LIBERO (9-12)
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # 1-skip across 35 Gemma layers
  action_head_layer_mode: even             # taps Gemma layers 1,3,5,...,35
  use_grad_checkpoint: false               # mandatory off when compile=on
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: true                    # v44 carry
  use_proper_residual: true                # v44 carry: proper Pre-LN residual stream
  proper_ffn_mode: proper_mlp              # v44 carry: LN -> Linear -> GELU -> Linear
  layer_scale_init: 0.0001                 # v44 carry: per-channel gamma init = 1e-4
  mlp_ratio: 1.0                           # v44 carry: mid = dim
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: true        # required by proprio_in_llm
  proprio_in_llm: true                     # v44 carry
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]  # v44 carry: all-linear
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_interleaved                    # single RLDS graph (v40 fix)
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  # Thread budgets for the single RLDS graph (no AUTOTUNE blowout).
  # 13 sources on 16-core NUMA0:
  #   traj_transform_threads = 13
  #   traj_read_threads      = 13
  #   frame_transform_threads = 16
  # Upper bound 42 threads, bounded.
  traj_transform_threads: 13
  traj_read_threads: 13
  frame_transform_threads: 16
  sources:
    - {dataset_name: fractal20220817_data, domain_id: 0, weight: 1.0}
    - {dataset_name: taco_play, domain_id: 1, weight: 1.0}
    - {dataset_name: jaco_play, domain_id: 2, weight: 1.0}
    - {dataset_name: viola, domain_id: 3, weight: 1.0}
    - {dataset_name: berkeley_autolab_ur5, domain_id: 4, weight: 1.0}
    - {dataset_name: stanford_hydra_dataset_converted_externally_to_rlds, domain_id: 5, weight: 1.0}
    - {dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds, domain_id: 6, weight: 1.0}
    - {dataset_name: austin_sailor_dataset_converted_externally_to_rlds, domain_id: 7, weight: 1.0}
    - {dataset_name: austin_sirius_dataset_converted_externally_to_rlds, domain_id: 8, weight: 1.0}
    # LIBERO 4 suites, one row per suite. Each weight=0.5 (option B per
    # codex round 9 audit, 2026-05-11). Old 0.25 left per-suite expected
    # count at 0.8 sample/step (< 1, P(zero)=44.5%); 0.5 lifts each suite
    # to 1.45/step (P(zero)=22.6%). LIBERO total share = 18.2%, OXE keeps
    # 81.8% — minimal perturbation vs v43/v44 OXE weighting.
    - {dataset_name: libero_10_no_noops,      domain_id: 9,  weight: 0.5}
    - {dataset_name: libero_goal_no_noops,    domain_id: 10, weight: 0.5}
    - {dataset_name: libero_object_no_noops,  domain_id: 11, weight: 0.5}
    - {dataset_name: libero_spatial_no_noops, domain_id: 12, weight: 0.5}
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 35000                         # v44 carry
  freeze_steps: 5000                       # v44 carry
  warmup_steps: 1000                       # v44 carry
  freeze_group_names: [gemma_lora]
  schedule_group_names:
    - gemma_lora
    - soft_prompts
    - action_queries
    - scene_projection
    - head_projections
    - action_head
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  compile_mode: default
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.1
    action_queries:    1.0
    scene_projection:  1.0
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000                         # disk quota mitigation (2026-05-11 incident)
  save_dir: outputs/oxe_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_bs8/checkpoints
  diagnostic_first_n_batches: 100
  num_workers: 0
  # 2026-05-11 disk quota incident: first launch crashed at step 6000 save.
  # First resume from step_5000 hit a separate bug: optimizer state loaded
  # with gemma_lora.lr=0 (frozen at save time), and the trainer captured
  # that as the scheduler's initial lr -> gemma_lora stuck at 0 for the
  # entire continuation. Fixed in scripts/train.py 2026-05-12 by restoring
  # build_optimizer's intended lrs after load_state_dict.
  # 2026-05-12: resuming from step_15000 (instead of step_5000) — model
  # weights for gemma_lora are identical to step_5000 (no updates while
  # frozen) but other components have 10k more steps of training.
  resume_ckpt: outputs/oxe_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_bs8/checkpoints/step_15000
  resume_full: true
wandb:
  enabled: true
  project: vla-project
  name: oxe_libero_pretrain_v45_nb18even_proper_mlp_alllinear_libero_dl50_4gpu_bs8_warmup1k
  tags: [oxe_libero_pretrain, rlds, multidomain, interleaved, da_2layer, soft_prompt_llm, wrist_in_llm, proprio_in_llm, ungated_streams, lora_alllinear, proper_mlp, layerscale1e-4, 13_domains, libero_split, dl50, 4gpu, bs8, nb18, even, compile_default, gc_off, scratch, freeze5k, warmup1k]

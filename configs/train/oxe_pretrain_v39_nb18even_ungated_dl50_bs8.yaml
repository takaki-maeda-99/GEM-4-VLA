# V39 OXE pretrain: nb=18 even + ungated_streams=True (9 OXE sources only).
#
# NOTE 2026-05-10: original v39 design (this file's earlier revision) added
# 4 LIBERO suites as separate domains (id 9-12, num_domains=13). That
# multi-domain pipeline failed to reach step 1 across 4 launch attempts
# (logs: launch.log.attempt5_stuck_libero, attempt6_heartbeat,
# attempt7_972threads, attempt8 SIGSEGV). Codex peer review identified
# the topology as the root cause: WeightedMultiDataset eagerly constructs
# 13 independent RLDS pipelines per worker, swamping dl50's 16-core
# NUMA0 with TF AUTOTUNE thread allocation. The fix is to use
# prismatic's make_interleaved_dataset for one shared RLDS graph; that
# redesign is tracked separately as v40 (not yet implemented).
#
# To unblock the ungated_streams hypothesis test now, this config drops
# the LIBERO sources and runs the v37 nb18even bs=8 pipeline unchanged
# except for the gating and schedule changes documented below. LIBERO
# coverage will come from the standard pretrain → LIBERO FT path used
# by v37, not from pretrain mixing.
#
# Hypothesis: the gating_factor parameterization (init=0, tanh) is what
# kills LLM-feature usage in the action_head, not layer-tap density. v37
# nb18even pretrain trained gates ≈ 0 by step 35k (max |gate| = 0.0625),
# making FT loss flat at 0.32. Post-hoc step_35000_gates5 (gates forced
# to 5.0 → tanh ≈ 0.9999 ≈ ungated) restored FT signal — but pretrain
# itself never ran with the gating bottleneck removed from step 0.
#
# v39 changes (from v37 nb18even bs=8):
#   - ungated_streams: false → true
#       Architecturally bypasses the gate via mlp_resnet_block_pro.py:97-100
#       (ratio_g=1.0 hardcoded; gating_factor parameter dropped). All 18
#       cross-attn streams (task, adapter, wrist) feed the action head at
#       full strength from step 0.
#   - LR schedule rewrite (per user direction 2026-05-10):
#       freeze_steps 5000 → 0   (no leading freeze period)
#       warmup_steps 2500 → 1000 (linear warmup over 1k steps for ALL
#                                  trainable groups; flat after warmup)
#       lr_coefs: VLM/soft_prompt 0.1×, action_head/action_queries/scene_proj
#                 1× (= base). head_projections 1× (kept consistent).
#       schedule_group_names: now includes head_projections + action_head
#         so they linearly warm up too (was: only gemma_lora/AQ/proj/soft).
#   - LIBERO mix REMOVED (deferred to v40 redesign):
#       num_domains stays at 9 (OXE only, id 0-8). The original v39
#       attempt 13-domain mix failed at TF data graph build; the v40
#       redesign will use prismatic's make_interleaved_dataset to fold
#       all sources into one RLDS graph instead of N independent
#       WeightedMultiDataset children.
#
# Direct comparison vs v37: step_35000 of v39 vs step_35000_gates5 of v37
# should look similar at the cross-attn level (gates5 ≈ ungated), but v39
# trained the rest of the model under that condition from step 0 AND saw
# LIBERO data during pretrain, so DA-row 9 / action_queries / scene_proj
# should already be calibrated for LIBERO when FT begins (less of a cold
# start than the v37 path).
#
# Trainer: NaN guard re-DDP-synced after v38 nb35 hit step-826 desync
# (re-applied 1a3db44 logic + extended to grad_norm path).
#
# Hardware: dl50 GPU 0-3 (NUMA0, 4× RTX 6000 Ada 49GB), DDP intra-NUMA PCIe.
# bs=8 + compile=default + GC=off retained (proven config from v37 35k run).
#
# Launch:
#   cd /misc/dl00/takaki/GEM-4-VLA
#   mkdir -p outputs/oxe_pretrain_v39_nb18even_ungated_dl50_bs8
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=0,1,2,3 \
#   nohup .venv/bin/accelerate launch \
#     --config_file configs/accelerate/dl50_4gpu.yaml \
#     scripts/train.py configs/train/oxe_pretrain_v39_nb18even_ungated_dl50_bs8.yaml \
#     > outputs/oxe_pretrain_v39_nb18even_ungated_dl50_bs8/launch.log 2>&1 &
seed: 0
model:
  num_domains: 9                           # 9 OXE only (LIBERO mix deferred to v40)
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # 1-skip across 35 Gemma layers
  action_head_layer_mode: even             # taps Gemma layers 1,3,5,...,35
  use_grad_checkpoint: false               # mandatory off when compile=on
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: true                    # ★ removes gating_factor; ratio_g=1.0
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
    # LIBERO sources removed (see v40 redesign for the multi-domain mix).
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 100000
  # New v39 schedule (2026-05-10): linear warmup over 1k steps for ALL
  # trainable groups, then flat (min_lr_ratio=1.0). No leading freeze
  # period — gemma_lora warms up from step 0 alongside the rest. Per-group
  # lr coefs encode the relative scale (VLM/soft_prompt 0.1×, the rest 1×).
  freeze_steps: 0
  warmup_steps: 1000
  freeze_group_names: []
  schedule_group_names:
    - gemma_lora
    - soft_prompts
    - action_queries
    - scene_projection
    - head_projections
    - action_head
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  compile_mode: default
  lr_coefs:
    gemma_lora:        0.1     # VLM = base × 0.1
    siglip:            0.0     # frozen
    wrist_siglip:      0.0     # frozen
    soft_prompts:      0.1     # base × 0.1
    action_queries:    1.0     # base
    scene_projection:  1.0     # base (= proj)
    head_projections:  1.0     # base
    action_head:       1.0     # base
  save_every: 5000
  save_dir: outputs/oxe_pretrain_v39_nb18even_ungated_dl50_bs8/checkpoints
  diagnostic_first_n_batches: 100
  # num_workers reverted to 0 with the LIBERO drop. v37 9-OXE pipeline
  # ran fine with num_workers=0 (main thread handles all 9 RLDS pipelines).
  # The num_workers=2 value was added to unblock 13-source LIBERO mix and
  # is no longer needed here.
  num_workers: 0
wandb:
  enabled: true
  project: vla-project
  name: oxe_libero_pretrain_v39_nb18even_ungated_dl50_4gpu_bs8_warmup1k
  tags: [oxe_pretrain, rlds, multidomain, da_2layer, soft_prompt_llm, wrist_in_llm, wrist_drop02, lora_r64, 9_domains, dl50, 4gpu, bs8, nb18, even, ungated_streams, compile_default, gc_off, scratch, no_freeze, warmup1k]

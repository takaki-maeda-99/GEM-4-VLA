# Example FT config consumed by scripts/ft_lerobot_from_hf.py.
# All prep + launch params are declared HERE. CLI flags are operational only:
#   uv run python scripts/ft_lerobot_from_hf.py configs/train/<this>.yaml
#   uv run python scripts/ft_lerobot_from_hf.py <yaml> --dry_run
#   uv run python scripts/ft_lerobot_from_hf.py <yaml> --force_extract
#   uv run python scripts/ft_lerobot_from_hf.py <yaml> --no_launch

# ---------- prep (read by launcher; ignored by scripts/train.py) ----------
prep:
  hf:
    repo_id: takaki99/GEM4_open_the_jar
    # converted_dir: data/converted/GEM4_open_the_jar_v21   # optional, default derived
    # converter: tools/convert_rebot_bottle_v3_to_v21.py    # optional
  norm_stats:
    dataset_key: jar_open
    # path: data/norm_stats/jar_open.json                   # optional, default derived
    # tool: tools/compute_norm_stats_so101.py               # optional
  frames:
    pre_extract: true
    workers: 16
    local_copy:
      enabled: true
      host: dl42
      path: /var/tmp/jar_frames_uint8

launch:
  host: dl42                          # null = local
  cuda_visible_devices: "0,1,2,3"
  num_processes: 4
  main_process_port: 29516
  accelerate_config: configs/accelerate/dl50_4gpu.yaml
  # cuda_home: /tmp/micromamba/envs/cuda-nvcc   # set on dl41 only

# ---------- standard train.py fields (these are the ones train.py reads) ----------
seed: 0
model:
  num_domains: 14
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18
  action_head_layer_mode: even
  use_grad_checkpoint: true
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.0
  ungated_streams: true
  use_proper_residual: true
  proper_ffn_mode: proper_mlp
  layer_scale_init: 0.0001
  mlp_ratio: 1.0
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: true
  proprio_in_llm: true
  prompt_max_len: 20
  prompt_in_task_stream: true
  proprio_in_task_stream: true
  soft_prompt_as_cross_attn_stream: true
  legacy_external_in_self_pool: false
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  log_per_domain_loss: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: lerobot_preextracted
  # These three MUST match what prep produces. Launcher warns on mismatch.
  root: data/converted/GEM4_open_the_jar_v21
  frames_root: /var/tmp/jar_frames_uint8        # local_copy.path if enabled, else <converted>/frames_uint8
  stats_path: data/norm_stats/jar_open.json
  unnorm_key: jar_open
  fps: 10
  action_chunk_len: 8
  domain_id: 13
  last_action_chunk_mode: zero
  scene_key: observation.images.front
  wrist_key: observation.images.wrist
  seed: 42
train:
  batch_size: 8
  gradient_accumulation_steps: 1
  optimizer_kind: adamw_8bit
  lr: 1.0e-4
  weight_decay: 0.01
  max_steps: 15000
  freeze_steps: 1500
  warmup_steps: 750
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  resume_ckpt: outputs/oxe_pretrain_v47_arch_v3_libero_dl50_bs8/checkpoints/step_100000
  resume_da_row_init: random        # MANDATORY when adding new DA row
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 2500
  save_dir: outputs/_example_ft_from_hf/checkpoints
  diagnostic_first_n_batches: 50
  num_workers: 4
wandb:
  enabled: true
  project: vla-project
  name: jar_open_v47_step100k_ft_example
  tags: [jar_open, ft, oxe_v47_arch_v3, domain13, dl42, 4gpu, eff_bs32]

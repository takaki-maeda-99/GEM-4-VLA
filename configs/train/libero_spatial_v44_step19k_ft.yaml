# V44 step_19000 -> LIBERO Spatial FT (new DA row 9, random init).
#
# v44 = v43 + use_proper_residual + proper_ffn_mode=proper_mlp + LayerScale
# (CaiT-style gamma init 1e-4) + mlp_ratio=1.0. Currently running on dl40
# GPU 4-7 (resumed at step_19000 after 2026-05-11 disk-quota crash). FT
# starts in parallel from the same step_19000 ckpt.
#
# Diffs from configs/train/libero_spatial_v43_step20k_ft.yaml:
#   - resume_ckpt: v43 step_20000 -> v44 step_19000
#   - model.use_proper_residual: (default false) -> true
#   - model.proper_ffn_mode: (default legacy) -> proper_mlp
#   - model.layer_scale_init: (default 0) -> 0.0001
#   - model.mlp_ratio: (default 1.0) -> 1.0 (explicit)
#   - save_dir / wandb name + tags reflect v44 source
#
# All other flags unchanged: proprio_in_llm, ungated_streams,
# include_proprio_placeholder, all-linear LoRA target.
#
# Hardware: dl42 GPU 3 (A6000 50GB, single-GPU). 1-GPU FT runs slower than
# 4-GPU but avoids contention with kondo on dl42 GPUs 0-2 and parallel
# v45 (dl50) / v44 (dl40) pretrain runs.
#
# Launch:
#   ssh dl42
#   cd /misc/dl00/takaki/GEM-4-VLA
#   mkdir -p outputs/libero_spatial_v44_step19k_ft
#   MALLOC_ARENA_MAX=2 MALLOC_TRIM_THRESHOLD_=0 \
#   CUDA_VISIBLE_DEVICES=3 \
#     nohup .venv/bin/accelerate launch \
#       --config_file configs/accelerate/dl42_1gpu.yaml \
#       scripts/train.py configs/train/libero_spatial_v44_step19k_ft.yaml \
#       > outputs/libero_spatial_v44_step19k_ft/launch.log 2>&1 &
seed: 0
model:
  num_domains: 10                          # 9 OXE (0-8) + LIBERO row 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 18                           # match v44
  action_head_layer_mode: even             # match v44
  use_grad_checkpoint: true                # FT: GC=on, compile=null
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.0                # FT: deploy with wrist always present
  ungated_streams: true                    # match v44
  use_proper_residual: true                # match v44
  proper_ffn_mode: proper_mlp              # match v44
  layer_scale_init: 0.0001                 # match v44
  mlp_ratio: 1.0                           # match v44
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: true        # match v44 (proprio_in_llm req)
  proprio_in_llm: true                     # match v44
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  log_per_domain_loss: false               # single-domain FT
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]  # match v44 all-linear
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  dataset_name: libero_spatial_no_noops
  action_chunk_len: 8
  shuffle_buffer_size: 16384
  train: true
  domain_id: 9                             # LIBERO row 9 (OXE = 0-8)
  seed: 42
  unnorm_key: libero_spatial_no_noops
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 1.0e-4                               # 0.5x pretrain LR for FT
  weight_decay: 0.01
  max_steps: 15000
  freeze_steps: 1500                       # 10% of max_steps
  warmup_steps: 750                        # 5% of max_steps
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  resume_ckpt: outputs/oxe_pretrain_v44_nb18even_proper_mlp_lora_alllinear_dl50_bs8/checkpoints/step_19000
  resume_da_row_init: random               # MANDATORY: new DA row must be random-init.
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 1000                         # frequent ckpts for early FT diagnostic / eval sweep
  save_dir: outputs/libero_spatial_v44_step19k_ft/checkpoints
  diagnostic_first_n_batches: 50
wandb:
  enabled: true
  project: vla-project
  name: oxe_v44_proper_mlp_step19k_ft_libero_spatial_domain9
  tags: [libero_spatial, ft, oxe_v44_proper_mlp, step19k, domain9, lora_alllinear, nb18, even, proprio_in_llm, ungated_streams, proper_residual, proper_mlp, layerscale1e-4, dl42, gpu3, random_da]

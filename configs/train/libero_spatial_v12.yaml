# V12: proprio normalization (Q99) + Mode B + ungated streams + wrist_bridge.
#
# Critical pipeline bug found 2026-05-03: our LeRobot-based dataset fed
# RAW proprio to the model (axis-angle/m units, e.g. z≈0.92-1.29, rx≈
# 2.78-3.28 rad). The 73% vla-gemma-4 baseline trained with RLDS auto-
# normalized proprio (BOUNDS_Q99 → [-1, +1] per channel). Without the
# normalization, the proprio_proj DA-Linear cannot map the wildly-scaled
# input to the LLM embedding space. This explains why v6-v11 all
# collapsed to constant prediction even with matching architecture.
#
# Fix: load proprio q99 stats (copied from vla-gemma-4) and apply
# normalize_proprio_q99 in both the dataset loader and the eval policy.
#
# Other diffs vs v11:
#   - Mode B (no LoRA): matches 73% baseline exactly. Reduces trainable
#     params; Gemma fully frozen except the projector heads.
#
# Architecture and other hyperparams kept at v11.
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: true
  # No `lora:` key → gemma fully frozen (gemma4_wrapper.py:74-79).
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: zero
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 0
  warmup_steps: 500
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:     0.0
    siglip:         0.0
    soft_prompts:   0.25
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 2500
  save_dir: outputs/libero_spatial_v12/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_v12_proprio_norm_modeB
  tags: [libero_spatial, bridge_form, legacy_block, num_blocks_24, ref_layout, ref_prompt_fmt, wrist_bridge, ungated_streams, proprio_normalize, mode_b]

# LIBERO-Spatial 10k EE6D run, Stage 2 (Gemma frozen + LoRA r=64).
# Same hyper-params as libero_spatial_lora.yaml so the EE6D vs native 7-dim
# comparison is apples-to-apples. Differences:
#   - model.action_dim 7 -> 20 (X-VLA EE6D layout)
#   - model.action_chunk_len 8 -> 30 (anchor count)
#   - model.loss_type "l1" -> "ee6d" (per-channel split: pos/rot/grip)
#   - data.action_format "native" -> "ee6d", anchor_window_s 4.0
seed: 0
model:
  num_domains: 1
  hidden_dim: 1536
  num_blocks: 35
  action_dim: 20
  action_chunk_len: 30
  loss_type: ee6d
  use_grad_checkpoint: true
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_lerobot_real
  repo_id: lerobot/libero_spatial_image
  stats_path: data/norm_stats/libero_spatial.json   # not used in ee6d, still loaded
  unnorm_key: libero_spatial_no_noops
  fps: 10
  download_videos: false
  domain_id: 0
  last_action_chunk_mode: real
  action_format: ee6d
  action_chunk_len: 30
  anchor_window_s: 4.0
train:
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 0.01
  max_steps: 10000
  freeze_steps: 1000
  warmup_steps: 2000
  min_lr_ratio: 1.0
  lr_coefs:
    gemma_lora:     0.1
    siglip:         0.1
    soft_prompts:   0.1
    action_queries: 1.0
    projections:    1.0
    action_head:    1.0
  save_every: 5000
  save_dir: outputs/libero_spatial_ee6d_lora_r64_2026-05-01/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_spatial_ee6d_lora_r64_bs8_10k_2026-05-01
  tags: [libero_spatial, bs8, stage2_lora, lora_r64, ee6d, anchor30_4s]

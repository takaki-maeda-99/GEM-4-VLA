# V34: v33 architecture + 4-domain RLDS multi-domain test.
#
# Trains on all 4 LIBERO RLDS suites (spatial / object / goal / 10) with
# uniform per-step weighting. Each RLDS sub-loader stamps its own domain_id
# (0..3) on every batch sample; DA-2-MLP projections + soft_prompt_hub each
# look up domain-specific Embedding rows.
#
# Stats: only libero_spatial has cached RLDS stats. The other 3 datasets
# trigger RLDS on-the-fly stats computation at construction (slow first run
# of each, then cached on disk).
#
# Architecture: identical to v33 (DA-2-MLP scene/proprio/wrist/action_decoder,
# soft prompt INJECTED into LLM, prompt_position=after_vision, no proprio
# placeholder, LoRA r=64 alpha=128 on q+v, bs=8, max_steps=40000).
#
# Launch single GPU on dl40 (NCCL multi-GPU broken since 5/4 apt upgrade):
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#   CUDA_VISIBLE_DEVICES=5 \
#   PYTHONPATH=...:src:vla-gemma-4/VLA-Adapter:vla-gemma-4 \
#   .venv-gemma4/bin/python scripts/train.py configs/train/libero_multidomain_v34.yaml
seed: 0
model:
  num_domains: 4                            # 4 LIBERO suites
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: true
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: libero_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/modified_libero_rlds
  shuffle_buffer_size: 256000
  train: true
  seed: 42
  unnorm_key: libero_spatial_no_noops      # eval-time stats key reference (used by _checkpoint_norm_stats)
  stats_path: /misc/dl00/takaki/vla-gemma-4/VLA-Adapter/outputs/LIBERO-Spatial-Pro/dataset_statistics.json
  sources:
    - dataset_name: libero_spatial_no_noops
      domain_id: 0
      weight: 1.0
    - dataset_name: libero_object_no_noops
      domain_id: 1
      weight: 1.0
    - dataset_name: libero_goal_no_noops
      domain_id: 2
      weight: 1.0
    - dataset_name: libero_10_no_noops
      domain_id: 3
      weight: 1.0
train:
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 40000
  freeze_steps: 4000
  warmup_steps: 2000
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 5000
  save_dir: outputs/libero_multidomain_v34/checkpoints
wandb:
  enabled: true
  project: vla-project
  name: libero_multidomain_v34_4suites_da2mlp_softprompt_llm_lora_r64
  tags: [libero_multidomain, rlds, mode_a, da_2layer, soft_prompt_llm, lora_r64, 4_domains, after_vision_prompt]

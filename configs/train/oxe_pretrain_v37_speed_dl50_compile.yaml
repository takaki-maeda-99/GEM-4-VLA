# V37 speed trial on dl50 — torch.compile(mode='default') ON, bs=8.
# Diff from oxe_pretrain_v37_speed_dl50.yaml:
#   - model.use_grad_checkpoint: true → false  (mandatory: compile+GC
#     hits InductorError 'op39' per scripts/train.py:403-405 comment)
#   - train.compile_mode: off → default  (read by scripts/train.py:393)
#   - wandb.name suffix: _compile_default
#
# Reference: dl40 A100 bs=1, 35-block: off=400.4 ms / default=173.3 ms (2.3x).
# Question: does that 2x hold at bs=8 (kernel-bound, not launch-bound)?
#
# Memory risk: GC=false at bs=8 will raise activation footprint vs the
# 20.3 GB measured with GC=true. 49 GB cap means ~28 GB headroom — should
# fit, but OOM is the failure mode if not.
#
# Compile cost: first few steps include graph capture + autotune (often
# 1-3 minutes on first call). Skip first 30+ steps when computing
# steady-state.
seed: 0
model:
  num_domains: 9
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: false               # mandatory off when compile=on
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
train:
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  max_steps: 200
  freeze_steps: 0
  warmup_steps: 50
  freeze_group_names: []
  schedule_group_names: []
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  ddp_find_unused_parameters: false
  compile_mode: default                    # torch.compile(mode='default', fullgraph=False)
  resume_ckpt: outputs/oxe_pretrain_v37/checkpoints/step_10000
  resume_da_row_init: random
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: null
  save_dir: null
  diagnostic_first_n_batches: 0
wandb:
  enabled: true
  project: vla-project
  name: oxe_pretrain_v37_speed_dl50_4gpu_compile_default_resume10k
  tags: [oxe_pretrain, speed_trial, 200_steps, dl50, resume_step10k, 4gpu, compile_default, gc_off]

# V37 smoke: 5k step launch verification on the FULL 11-source mixture.
#
# Intent (per user "ミニマムで配管検証はしつつも、それは学習が開始できるかどうかの確認。
# なので、使うデータセット自体は小さくしない"):
#   confirm trainer launches, all 11 children iterate, DDP across 6 GPUs
#   forms gradients, checkpoint at step 5000 saves with the per-domain
#   norm-stats manifest. Loss should be DECREASING but not yet converged.
#
# Norm-stats manifest (B5+B11): saved into ckpt meta.json by
# scripts/train.py:_build_oxe_norm_manifest. Each source's friendly stats
# at <data_dir>/<dataset_name>/dataset_statistics.json must exist before
# launch (run tools/precompute_oxe_stats.py). _checkpoint_norm_stats raises
# FileNotFoundError if any are missing.
#
# Inherits configs/train/oxe_pretrain_v37.yaml. Diffs:
#   - max_steps: 100000 → 5000
#   - freeze_steps: 10000 → 500 (10% of 5k smoke; lets loss actually move)
#   - warmup_steps: 5000 → 250 (5% of 5k smoke; warmup completes by step 250)
#   - save_every: 10000 → 5000 (single ckpt at end)
#   - save_dir: oxe_pretrain_v37 → oxe_pretrain_v37_smoke
#   - wandb.name suffix: _smoke
seed: 0
model:
  num_domains: 9                           # v37: kuka dropped 2026-05-06 (quota), bridge dropped 2026-05-07 (corrupt tfrecord)
  compat_profile: x_vla_adapter
  hidden_dim: 1536
  num_blocks: 24
  use_grad_checkpoint: true
  use_wrist_bridge: false
  wrist_in_llm: true
  wrist_view_dropout_p: 0.2
  ungated_streams: false
  use_soft_prompt: true
  num_soft_prompt_tokens: 32
  soft_prompt_in_llm: true
  prompt_position: after_vision
  include_proprio_placeholder: false
  prompt_max_len: 20
  use_baseline_projectors: false
  proj_arch: da_2layer
  proj_hidden_dim: 1536
  vision_placeholder_mode: unused_range
  freeze_llm_and_aq: false
  freeze_action_queries: false
  wrap_llm_in_no_grad: false
  lora:
    r: 64
    alpha: 128
    target_modules: [q_proj, v_proj]
    dropout: 0.0
vision:
  type: timm
  model_name: google/siglip-so400m-patch14-224
language:
  model_name: google/gemma-4-E2B
data:
  type: oxe_rlds_multidomain
  data_dir: /misc/dl00/takaki/vla-gemma-4/data/stage3_openx
  action_chunk_len: 8
  shuffle_buffer_size: 65536
  train: true
  seed: 42
  sources:
    - dataset_name: fractal20220817_data
      domain_id: 0
      weight: 1.0
    - dataset_name: taco_play
      domain_id: 1
      weight: 1.0
    # NOTE: kuka dropped 2026-05-06 due to disk-quota constraints; domain_id renumbered.
    - dataset_name: jaco_play
      domain_id: 2
      weight: 1.0
    - dataset_name: viola
      domain_id: 3
      weight: 1.0
    - dataset_name: berkeley_autolab_ur5
      domain_id: 4
      weight: 1.0
    - dataset_name: stanford_hydra_dataset_converted_externally_to_rlds
      domain_id: 5
      weight: 1.0
    - dataset_name: nyu_franka_play_dataset_converted_externally_to_rlds
      domain_id: 6
      weight: 1.0
    - dataset_name: austin_sailor_dataset_converted_externally_to_rlds
      domain_id: 7
      weight: 1.0
    - dataset_name: austin_sirius_dataset_converted_externally_to_rlds
      domain_id: 8
      weight: 1.0
    # NOTE: bridge dropped 2026-05-07 (corrupt tfrecord). See oxe_pretrain_v37.yaml.
train:
  # v37: per-GPU bs=8, 8-bit AdamW (bitsandbytes) to fit DA-2-MLP × num_domains=9
  # optimizer state in A100-40GB. 8-bit Adam saves ~600 MB / GPU vs fp32 AdamW
  # by quantizing momentum buffers; numerical behavior is well-characterized in
  # the LoRA/QLoRA literature and matches AdamW within a few %. Effective batch
  # = 8 × 6 GPU = 48 (= target, no grad_accum).
  batch_size: 8
  optimizer_kind: adamw_8bit
  lr: 2.0e-4
  weight_decay: 0.01
  # v37 mini-smoke: 500 step (was 5000). After Option X (codex round 9 + user
  # 2026-05-07): full 5000-step smoke ran through step ~1100 with healthy
  # signals (loss 0.65→0.22, mem stable, all 9 domains uniform), so we
  # truncate to 500 step + save_every=500 to produce a ckpt for B post-smoke
  # validation, then go straight to 100k production.
  max_steps: 500
  freeze_steps: 50
  warmup_steps: 25
  freeze_group_names: [gemma_lora]
  schedule_group_names: [gemma_lora, action_queries, scene_projection, soft_prompts]
  min_lr_ratio: 1.0
  grad_clip_norm: 1.0
  lr_coefs:
    gemma_lora:        0.1
    siglip:            0.0
    wrist_siglip:      0.0
    soft_prompts:      0.5
    action_queries:    0.5
    scene_projection:  0.5
    head_projections:  1.0
    action_head:       1.0
  save_every: 500
  save_dir: outputs/oxe_pretrain_v37_smoke/checkpoints
  diagnostic_first_n_batches: 100           # v37 smoke (B10): same as production
  ddp_find_unused_parameters: false         # v37 C1: FUP=False (no actual unused params in v37 model)
wandb:
  enabled: true
  project: vla-project
  name: oxe_pretrain_v37_smoke
  tags: [oxe_pretrain, rlds, multidomain, smoke, 11_domains]
